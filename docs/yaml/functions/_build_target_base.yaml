name: _build_target_base
returns: void
description: PRIVATE

posargs:
  target_name:
    description: The *unique* name of the build target
    type: str

varargs:
  name: source
  type: str | file | custom_tgt | custom_idx | generated_list
  description: |
    Input source to compile. The following types are supported:

    - Strings relative to the current source directory
    - [[@file]] objects defined in any preceding build file
    - The return value of configure-time generators such as [[configure_file]]
    - The return value of build-time generators such as
      [[custom_target]] or [[generator.process]]

    These input files can be sources, objects, libraries, or any other
    file. Meson will automatically categorize them based on the extension
    and use them accordingly. For instance, sources (`.c`, `.cpp`,
    `.vala`, `.rs`, etc) will be compiled and objects (`.o`, `.obj`) and
    libraries (`.so`, `.dll`, etc) will be linked.

    With the Ninja backend, Meson will create a build-time [order-only
    dependency](https://ninja-build.org/manual.html#ref_dependencies) on
    all generated input files, including unknown files. This is needed to
    bootstrap the generation of the real dependencies in the
    [depfile](https://ninja-build.org/manual.html#ref_headers) generated
    by your compiler to determine when to rebuild sources. Ninja relies on
    this dependency file for all input files, generated and non-generated.
    The behavior is similar for other backends.

warnings:
  - The `link_language` kwarg was broken until 0.55.0

kwargs:
  <lang>_pch:
    type: str
    description: precompiled header file to use for the given language

  <lang>_args:
    type: array[str | file]
    description: |
      compiler flags to use for the given language; eg: `cpp_args` for C++

  sources:
    type: str | file | custom_tgt | custom_idx | generated_list | structured_src
    description: Additional source files. Same as the source varargs.

  build_by_default:
    type: bool
    default: true
    since: 0.38.0
    description: |
      Causes, when set to `true`, to have this target be built by default.
      This means it will be built when `meson compile` is called without any
      arguments. The default value is `true` for all built target types.

  build_rpath:
    type: str
    since: 0.42.0
    description: |
      A string to add to target's rpath definition in the build dir,
      but which will be removed on install

  dependencies:
    type: array[dep]
    description: |
      one or more dependency objects
      created with
      [[dependency]] or [[compiler.find_library]]
      (for external deps) or [[declare_dependency]]
      (for deps built by the project)

  extra_files:
    type: str | file
    description: |
      Not used for the build itself but are shown as source files in IDEs
      that group files by targets (such as Visual Studio).

      These may only be static sources.

  gui_app:
    type: bool
    deprecated: 0.56.0
    default: false
    description: |
      When set to true flags this target as a GUI application
      on platforms where this makes a difference, **deprecated** since
      0.56.0, use `win_subsystem` instead.

  link_args:
    type: array[str]
    description: |
      Flags to use during linking. You can use UNIX-style
      flags here for all platforms.

  link_early_args:
    type: array[str]
    description: |
      Flags to use during linking. These are just like link_args,
      except that they are inserted into the linker command line
      before any object files or libraries. You can use UNIX-style
      flags here for all platforms. This is only supported when using
      the Ninja backend.

  link_depends:
    type: str | file | custom_tgt | custom_idx
    description: |
      Strings, files, or custom targets the link step depends on
      such as a symbol visibility map. The purpose is to
      automatically trigger a re-link (but not a re-compile) of the target
      when this file changes.

  link_language:
    type: str
    since: 0.51.0
    description: |
      Makes the linker for this target be for the specified language.
      It is generally unnecessary to set
      this, as Meson will detect the right linker to use in most cases. There are
      only two cases where this is needed. One, your main function in an
      executable is not in the language Meson picked, or second you want to force
      a library to use only one ABI.

      *(broken until 0.55.0)*

  link_whole:
    type: array[lib | custom_tgt | custom_idx]
    since: 0.40.0
    description: |
      Links all contents of the given static libraries whether they are used or
      not, equivalent to the `-Wl,--whole-archive` argument flag of GCC, or the
      '/WHOLEARCHIVE' MSVC linker option. This allows the linked target to
      re-export symbols from all objects in the static libraries.

      *(since 0.41.0)* If passed an array that array will be flattened.

      *(since 0.51.0)* This argument also accepts outputs produced by
      custom targets. The user must ensure that the output is a library in
      the correct format.

  link_with:
    type: array[lib | custom_tgt | custom_idx]
    description: |
      One or more shared or static libraries
      (built by this project) that this target should be linked with. *(since 0.41.0)* If passed an
      array that array will be flattened. *(since 0.51.0)* The arguments can also be custom targets.
      In this case Meson will assume that merely adding the output file in the linker command
      line is sufficient to make linking work. If this is not sufficient,
      then the build system writer must write all other steps manually.

  implicit_include_directories:
    type: bool
    since: 0.42.0
    default: true
    description: Controls whether Meson adds the current source and build directories to the include path

  cpp_modules:
    type: bool
    since: 1.12.0
    default: false
    description: |
      Explicitly mark this target as using C++20 named modules, enabling the
      module scan/collate pipeline even when the target has no
      module-interface source of its own (for example a consumer whose sources
      all use a non-module extension). A target that has a `.cppm`/`.ixx`
      source, or that links a target which provides modules, is treated as
      module-enabled automatically without this keyword.

      Module detection never reads source contents; it is driven entirely by
      extensions, this keyword and the link graph. With GCC, a module
      interface in a plain `.cpp`/`.cc` therefore needs this keyword (or a
      rename to `.cppm`/`.ixx`). With MSVC and Clang, interfaces must use the
      `.cppm`/`.ixx` extension in any case: those compilers need each
      interface unit flagged explicitly (`/interface`, `-x c++-module`), and
      Meson derives that per-source flag from the extension alone, so this
      keyword only covers consumers there.

      Currently supported with GCC (>= 14), MSVC, and Clang (needs a
      P1689-capable `clang-scan-deps`) on the Ninja backend only.

  cpp_header_units:
    type: array[str | file]
    since: 1.12.0
    default: []
    description: |
      C++ header units imported by this target's sources.
      Each entry is the header **as spelled in the import**, resolved on the
      target's include path: `'pkg/header.h'` is a user header unit
      (`import "pkg/header.h";`) and `'<pkg/header.h>'` is a system header unit
      (`import <pkg/header.h>;`). Meson pre-builds each unit's BMI from this
      list, because a header unit's BMI must exist before the sources that
      import it are scanned and compiled. On GCC consumers resolve the BMI
      through a module mapper, so no BMI path reaches a command line; on MSVC
      and Clang Meson passes each consumer an explicit mapping to it
      (`/headerUnit` and `-fmodule-file` respectively).

      A unit's BMI freezes the module-affecting flags it was built with, so
      targets that declare the same header unit with divergent flags each get a
      BMI of it, one per flag equivalence class. The exception is GCC and the
      *dialect* (`cpp_std`, `cpp_eh`, `cpp_rtti`), which it records in the unit
      and refuses to read back under any other, while scanning -- before a
      per-class BMI can be selected. Declaring one header unit from targets whose
      dialects differ therefore cannot work on GCC: Meson warns and the build
      fails at the scan.

      Every header unit a source imports must be listed (the declaration does
      not propagate through dependencies, so a consumer that imports the same
      header must declare it too), and it must be listed **as that source spells
      it**: a compiler keys a unit by the text the import resolved through, so
      `import "../header.h";` from a subdirectory is a spelling of its own.
      Declaring several spellings of one file is free -- they share its BMI
      rather than each building one. An *undeclared* spelling is an error on GCC
      and cannot be healed, because finding it would take the scan that the
      missing BMI is what breaks; Clang matches any spelling of a declared unit.

      **Ordering:** the units are built before all of the target's scans and
      compiles, but they are *not* ordered relative to each other, so a header
      unit that itself `import`s another header unit is not supported (list
      header units that only `#include` their prerequisites, which are absorbed
      textually). Implies module handling for the target.

      On GCC a declared header unit must exist at setup time, since GCC names a
      unit by the path its header resolves to and Meson has to work that out
      while configuring: a header written *during* the build (a `custom_target`
      or `generator` output) cannot be a header unit there and is reported at
      configure time, while a `configure_file` output can, existing by the time
      configuration ends.

      Currently supported with GCC (>= 14), MSVC (>= VS 2022 17.2, cl 19.32)
      and Clang (needs a P1689-capable `clang-scan-deps`, the same requirement
      as `cpp_modules`) on the Ninja backend only; declaring it on any other
      compiler is an error rather than being silently ignored. Note that
      header units are an experimental feature in Clang: it emits a
      `-Wexperimental-header-units` warning per import, which Meson
      deliberately does not suppress -- pass
      `-Wno-experimental-header-units` in `cpp_args` to accept the feature's
      status and silence it.

  cpp_module_interfaces:
    type: array[str | file]
    since: 1.12.0
    default: []
    description: |
      Names which of this target's C++ sources are module *interface* units,
      whatever their file extension. Each entry is one of the target's own
      sources (a string or a [[files]] object); a path that names no source is
      an error, not a silent no-op.

      Meson otherwise identifies a module interface by its `.cppm`/`.ixx`
      extension, never by reading the source, and that extension is also how
      Clang and MSVC are told, per source, to compile a translation unit as an
      interface unit (Clang `-x c++-module`; cl `/interface`) -- GCC infers it
      from the source. A project that uses a plain extension such as `.cc` for
      an `export module` therefore builds on GCC (with `cpp_modules: true`) but
      could not build at all on Clang or MSVC. This keyword closes that gap: it
      marks the listed sources as interface units regardless of extension, so
      the same project is portable across the three compilers. Existing
      `.cppm`/`.ixx` sources need no declaration.

      For an internal (implementation) module partition -- `module pkg:impl;`
      with no export -- use `cpp_internal_partitions` instead: cl compiles it
      with `/internalPartition` and rejects an interface file extension for it.

      Currently supported with GCC (>= 14), MSVC, and Clang (needs a
      P1689-capable `clang-scan-deps`) on the Ninja backend only.

  cpp_internal_partitions:
    type: array[str | file]
    since: 1.12.0
    default: []
    description: |
      Names which of this target's C++ sources are *internal* (implementation)
      module partitions -- a `module pkg:impl;` unit with no `export`. Each
      entry is one of the target's own sources (a string or a [[files]]
      object); a path that names no source is an error, not a silent no-op.

      An internal partition is still a BMI-producing, importable module unit,
      compiled and ordered like any other module unit on every compiler.
      Declaring it here only changes behavior on MSVC: cl compiles a declared
      source with `/internalPartition` instead of `/interface`, and rejects an
      interface file extension (`.ixx`) for it, so a portable `meson.build`
      should give an internal partition's source a plain implementation
      extension such as `.cpp`. GCC (which infers the unit kind from the
      source itself) and Clang (`-x c++-module`, kind-agnostic) both treat
      this keyword as a portable no-op, so a GCC- or Clang-only project may
      leave an internal partition undeclared.

      Listing a source in both `cpp_internal_partitions` and
      `cpp_private_module_interfaces` is fine, and is in fact how a partition
      of a *private* primary module is itself marked private: see
      `cpp_private_module_interfaces` below, since a partition does not
      automatically inherit privacy from its primary.

      Currently supported with GCC (>= 14), MSVC, and Clang (needs a
      P1689-capable `clang-scan-deps`) on the Ninja backend only.

  cpp_private_module_interfaces:
    type: array[str | file]
    since: 1.12.0
    default: []
    description: |
      Names which of this target's C++ sources are module interfaces that are
      *private*: importable only by this target's own sources, never
      published to anything that links this target, and not subject to the
      *build-tree-wide* rule that a module name have only one providing
      target -- two unrelated targets may each declare their own private
      module of the same name. This does not relax the rule *within one
      link*: a module's exported entities are mangled from its bare module
      name alone, so two same-named modules -- private or not -- reaching
      the same link is still a hard error, exactly as for two public ones.
      Each entry is one of the target's own sources (a string or a [[files]]
      object); a path that names no source is an error, not a silent no-op.

      This takes sources, not module names, for two reasons. A module's name
      is only known after Meson scans the source at build time, but the
      directory a private interface's BMI is written to is decided at setup
      time, before any scan runs -- so privacy has to be decidable from the
      source alone. And on MSVC, `/ifcOutput` (the directory cl writes a
      translation unit's BMI to) is fixed once per compile; a target mixing
      public and private interfaces needs to know, per source and at setup
      time, which directory each one's BMI belongs in.

      A source may not be listed in both `cpp_module_interfaces` and
      `cpp_private_module_interfaces`: being private already implies being an
      interface, so the combination is ambiguous rather than meaningful, and
      is rejected. Listing a source in both `cpp_internal_partitions` and
      `cpp_private_module_interfaces` is fine, and is in fact how a partition
      itself is marked private -- **a partition does not automatically
      inherit privacy from its primary module**, and must be listed here on
      its own if it too should be private. Meson enforces this: leaving a
      private primary's partition out of `cpp_private_module_interfaces` is a
      build-time error, not a silently-accepted gap.

      Declaring this on an `executable()` is accepted, not an error. On an
      ordinary executable it is simply redundant -- nothing can link an
      executable to import from it, so every module it provides is already
      private -- which means a target does not need its module keywords edited
      when switched between `executable()` and a library. On an executable
      built with `export_dynamic`, though, it is meaningful: such an
      executable *can* be linked (by a [[shared_module]] it loads at runtime,
      which resolves symbols back into it), so its modules are published to
      whatever links it exactly as a library's are, and this keyword names the
      ones that must not be.

      Currently supported with GCC (>= 14), MSVC, and Clang (needs a
      P1689-capable `clang-scan-deps`) on the Ninja backend only; declaring it
      with any other compiler is an error rather than being silently ignored,
      since a silently-dropped privacy declaration would leave the module
      published under the ordinary global-uniqueness rule with no warning.

  include_directories:
    type: array[inc | str]
    description: |
      one or more objects created with the [[include_directories]] function, or
      *(since 0.50.0)* strings, which will be implicitly convert to [[@inc]]
      objects

  install:
    type: bool
    default: false
    description: When set to true, all outputs of this build_target will be installed.

  install_dir:
    type: array[str | bool]
    description: |
      override install directory for outputs of this build target. If the value is a
      relative path, it will be considered relative the `prefix` option.
      For example, if you want to install plugins into a subdir, you'd use
      something like this: `install_dir : get_option('libdir') / 'projectname-1.0'`.

      This can be set to an array of values to control the the installation path
      of build targets with multiple outputs. Currently, that means Vala. Setting
      them to `true` means "use the default", and `false` means, don't install.
      By default the first element is true, and all other elements are false.

      *Since 1.11.0* Passing an array is deprecated, and install_vala_header,
      install_vala_vapi, and install_vala_gir keyword arguments should be used
      instead.

  install_mode:
    type: array[str | int]
    since: 0.47.0
    description: |
      Specify the file mode in symbolic format
      and optionally the owner/uid and group/gid for the installed files.

      See the `install_mode` kwarg of [[install_data]] for more information.

  install_tag:
    type: str
    since: 0.60.0
    description: |
      A string used by the `meson install --tags` command
      to install only a subset of the files. By default all build targets have the
      tag `runtime` except for static libraries that have the `devel` tag.

  install_rpath:
    type: str
    description: |
      A string to set the target's rpath to after install
      (but *not* before that). On Windows, this argument has no effect.

  objects:
    type: array[extracted_obj | file | str]
    description: |
      List of object files that should be linked in this target.

      **Since 1.1.0** this can include generated files in addition to
      object files that you don't have source to or that object files
      produced by other build targets.  In earlier release, generated
      object files had to be placed in `sources`.

  name_prefix:
    type: str
    description: |
      The string that will be used as the prefix for the
      target output filename by overriding the default (only used for
      libraries). By default this is `lib` on all platforms and compilers,
      except for MSVC shared libraries where it is omitted to follow
      convention, and Cygwin shared libraries where it is `cyg`.

      To conditionally keep the default behavior use a [[default]] object.
      For Meson < 1.12, use `[]`.

  name_suffix:
    type: str
    description: |
      The string that will be used as the extension for the
      target by overriding the default. By default on Windows this is
      `exe` for executables and on other platforms it is omitted.

      For shared libraries, the default value
      is `dylib` on macOS, `dll` on Windows, and `so` everywhere else.
      For static libraries, it is `a` everywhere. By convention MSVC
      static libraries use the `lib` suffix, but we use `a` to avoid a
      potential name clash with shared libraries which also generate
      import libraries with a `lib` suffix.

      To conditionally keep the default behavior use a [[default]] object.
      For Meson < 1.12, use `[]`.

  override_options:
    type: array[str] | dict[str | bool | int | array[str]]
    since: 0.40.0
    description: |
      takes an array of strings in the same format as `project`'s `default_options`
      overriding the values of these options
      for this target only.
      *(since 1.2.0)*: A dictionary may now be passed.

  gnu_symbol_visibility:
    type: str
    since: 0.48.0
    description: |
      Specifies how symbols should be exported, see
      e.g [the GCC Wiki](https://gcc.gnu.org/wiki/Visibility) for more
      information. This value can either be an empty string or one of
      `default`, `internal`, `hidden`, `protected` or `inlineshidden`, which
      is the same as `hidden` but also includes things like C++ implicit
      constructors as specified in the GCC manual. Ignored on compilers that
      do not support GNU visibility arguments. See also
      [`snippets.symbol_visibility_header()`](Snippets-module.md#symbol_visibility_header)
      method to help with defining public API.

  d_import_dirs:
    type: array[inc | str]
    since: 0.62.0
    description: |
      the directories to add to the string search path (i.e. `-J` switch for DMD).
      Must be objects created with the [[include_directories]] function or plain
      strings, which will be implicitly converted into [[@inc]] objects.

  d_unittest:
    type: bool
    default: false
    description: When set to true, the D modules are compiled in debug mode.

  d_module_versions:
    type: array[str | int]
    description: List of module version identifiers set when compiling D sources.

  d_debug:
    type: array[str]
    description: |
      The [D version identifiers](https://dlang.org/spec/version.html#version) to add
      during the compilation of D source files.

  native:
    type: bool
    default: false
    description: Controls whether the target is compiled for the build or host machines.

  win_subsystem:
    type: str
    default: "'console'"
    since: 0.56.0
    description: |
      Specifies the subsystem type to use
      on the Windows platform. Typical values include `console` for text
      mode programs and `windows` for gui apps. The value can also contain
      version specification such as `windows,6.0`. See [MSDN
      documentation](https://docs.microsoft.com/en-us/cpp/build/reference/subsystem-specify-subsystem)
      for the full list.

  rust_crate_type:
    type: str
    since: 0.42.0
    deprecated: 1.3.0
    description: |
      Set the specific type of rust crate to compile (when compiling rust).

      If the target is an [[executable]] this defaults to "bin", the only
      allowed value.

      If it is a [[static_library]] it defaults to "lib", and may be "lib",
      "staticlib", or "rlib". If "lib" then Rustc will pick a default, "staticlib"
      means a C ABI library, "rlib" means a Rust ABI.

      If it is a [[shared_library]] it defaults to "lib", and may be "lib",
      "dylib", "cdylib", or "proc-macro". If "lib" then Rustc will pick a
      default, "cdylib" means a C ABI library, "dylib" means a Rust ABI, and
      "proc-macro" is a special rust procedural macro crate.

      "proc-macro" is new in 0.62.0.

      *Since 1.3.0* this is deprecated and replaced by "rust_abi" keyword argument.
      `proc_macro` crates are now handled by the [`rust.proc_macro()`](Rust-module.md#proc_macro)
      method.

  rust_dependency_map:
    type: dict[str]
    since: 1.2.0
    description: |
      On rust targets this allows giving custom names to the crates that are
      linked into the target.  For example, passing a dependency map of
      `{ 'gtk4': 'gtk' }` has the same effect of writing `gtk.package = "gtk4"`
      in the `dependencies` section of a Cargo.toml file, or
      `extern crate gtk4 as gtk` inside Rust code.

      *Since 1.10.0*, the keys can be either crate names or target names.

  vala_header:
    type: str
    description: |
      On Vala targets, this provides a way to override the name of the generated
      C compatible header for targets that generate them.

      If it is not set the default will be calculated from the target's name.

  vala_vapi:
    type: str
    description: |
      On Vala targets, this provides a way to override the name of the generated
      VAPI file.

      If it is not set the default will be calculated from the target's name.

  vala_gir:
    type: str
    description: |
      If set, generates a GIR file with the given name. If this is unset then
      no GIR file will be generated.

  build_subdir:
    type: str
    since: 1.10.0
    description:
      Places the build results in a subdirectory of the given name
      rather than directly into the build directory. This does not
      affect the install directory, which uses install_dir.

      This allows inserting a directory name into the build path,
      either when needed to use the build result while building other
      targets or as a way to support multiple targets with the same
      basename by using unique build_subdir values for each one.

      To prevent collisions within the build directory, build_subdir
      is not allowed to match a file or directory in the source
      directory, nor contain '..' to refer to the parent of the build
      directory.

  install_vala_header:
    type: str | bool
    since: 1.11.0
    description: |
      If set to a string value, the vala generated header will be installed to
      that path, if set to `true`, the default include path will be used, if
      `false` the header will not be installed.

      The default value is `false`.

  install_vala_vapi:
    type: str | bool
    since: 1.11.0
    description: |
      If set to a string value, the vala generated vapi library will be
      installed to that path, if set to `true`, the default vapi path will be
      used, if `false` the vapi library will not be installed.

      The default value is `false`.

  install_vala_gir:
    type: str | bool
    since: 1.11.0
    description: |
      If set to a string value, the vala generated gir library will be
      installed to that path, if set to `true`, the default gir path will be
      used, if `false` the gir library will not be installed.

      It is an error for this to be either `true` or a string and `vala_gir` to
      be unset.

      The default value is `false`.
